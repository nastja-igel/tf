name: Accessibility Tests

# ── Triggers ──────────────────────────────────────────────────────────────
# Automatic: after every successful token export
# Manual:    GitHub Actions UI  |  AI command "Проверь доступность"
on:
  workflow_dispatch:
  workflow_run:
    workflows: ['Export Figma Tokens']
    types: [completed]
    branches: [main]

jobs:
  a11y:
    name: Run a11y tests on all stories
    runs-on: ubuntu-latest
    # If triggered by workflow_run, only run when the upstream job succeeded
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run Storybook tests with strict a11y
        # VITE_A11Y_STRICT=true is read by .storybook/preview.tsx to set
        # a11y.test = 'error', turning violations into test failures.
        env:
          VITE_A11Y_STRICT: 'true'
          CI: 'true'
        run: npx vitest run --project=storybook --reporter=verbose

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: a11y-results-${{ github.run_number }}
          path: |
            test-results/
            coverage/
          retention-days: 14
