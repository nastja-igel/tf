name: Export Figma Tokens

# ── Triggers ──────────────────────────────────────────────────────────────
# Manual: GitHub Actions UI → "Run workflow"
# AI command: "Обнови токены"
on:
  workflow_dispatch:
    inputs:
      file_key:
        description: 'Figma file key (leave blank for default)'
        required: false
        default: ''

# ── Permissions ───────────────────────────────────────────────────────────
permissions:
  contents: write          # to commit generated tokens
  pull-requests: write     # to open a PR

jobs:
  export:
    name: Fetch & commit tokens
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Use PAT so the commit triggers downstream workflows
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run token export script
        env:
          FIGMA_TOKEN:    ${{ secrets.FIGMA }}
          FIGMA_FILE_KEY: ${{ inputs.file_key || 'QR1l96ckjmA9QeZyCVzTi2' }}
        run: node scripts/figma-tokens.mjs

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet src/tokens.figma.css src/tokens.css || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit & push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/tokens.figma.css src/tokens.css
          git commit -m "chore(tokens): sync Figma variables $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push

      - name: No changes
        if: steps.diff.outputs.changed != 'true'
        run: echo "✅ Tokens are already up to date — nothing to commit."

      # After token sync, trigger the a11y tests automatically
      - name: Trigger a11y tests
        if: steps.diff.outputs.changed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner:   context.repo.owner,
              repo:    context.repo.repo,
              workflow_id: 'test-a11y.yml',
              ref:     'main',
            })
            console.log('✅ Triggered test-a11y.yml')
