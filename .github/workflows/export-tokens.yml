name: Export Figma Tokens

# ── How this works ────────────────────────────────────────────────────────
#
# Figma's Variables REST API requires an Enterprise plan.
# Token export is done locally by Claude via the Figma Desktop Plugin API
# (MCP connection) which works on any plan.
#
# Flow:
#   1. "Обнови токены" →
#   2. Claude calls get_variable_defs via Figma MCP →
#   3. Claude writes src/tokens.figma.css, commits & pushes to main →
#   4. deploy.yml triggers automatically (push to main) →
#   5. This workflow triggers to run a11y tests on the updated tokens
#
# ── Triggers ──────────────────────────────────────────────────────────────
on:
  workflow_dispatch:

  # Also fire automatically whenever tokens.figma.css changes on main
  push:
    branches: [main]
    paths:
      - 'src/tokens.figma.css'
      - 'src/tokens.css'

permissions:
  contents: read
  actions:  write   # to dispatch test-a11y

jobs:
  post-export:
    name: Validate tokens & trigger a11y
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate tokens.figma.css
        run: |
          FILE="src/tokens.figma.css"
          if [ ! -f "$FILE" ]; then
            echo "❌ $FILE not found — push the file before triggering this workflow"
            exit 1
          fi
          VARS=$(grep -c '^\s*--' "$FILE" || true)
          echo "✅ $FILE exists — $VARS custom properties"
          head -6 "$FILE"

      - name: Trigger a11y tests
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner:       context.repo.owner,
              repo:        context.repo.repo,
              workflow_id: 'test-a11y.yml',
              ref:         'main',
            })
            console.log('✅ Triggered test-a11y.yml')
