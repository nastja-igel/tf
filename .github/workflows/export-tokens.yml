name: Export Figma Tokens

# ── How this works ────────────────────────────────────────────────────────
#
# Calls Figma's Variables REST API (requires Figma Professional plan or higher),
# generates src/tokens.figma.css, and commits + pushes if anything changed.
# Pushing tokens.figma.css triggers deploy.yml → GitHub Pages + Storybook rebuild.
#
# Prerequisites (one-time setup):
#   1. Go to https://www.figma.com/developers/api#access-tokens
#      → create a Personal Access Token with "File content" read scope
#   2. Add it as a GitHub secret:
#      Repo → Settings → Secrets and variables → Actions → New secret
#      Name: FIGMA_TOKEN
#
# ── Triggers ──────────────────────────────────────────────────────────────
on:
  workflow_dispatch:   # manual trigger from GitHub Actions UI

permissions:
  contents: write      # needed to commit + push tokens.figma.css

jobs:
  export:
    name: Fetch tokens from Figma and commit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Export tokens from Figma
        env:
          FIGMA_TOKEN: ${{ secrets.FIGMA_TOKEN }}
          FIGMA_FILE: sVpDRrA1nRbENMMIcS3HqN
        run: node .github/scripts/export-tokens.js

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet src/tokens.figma.css; then
            echo "No token changes — nothing to commit."
          else
            git add src/tokens.figma.css
            git commit -m "chore(tokens): sync Figma variables $(date -u +%Y-%m-%dT%H:%M) UTC"
            git push
            echo "Pushed updated tokens. Deploy workflow will trigger automatically."
          fi
